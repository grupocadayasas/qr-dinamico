<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#b51f2e">
  <title>Tarjeta de contacto</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="public-page">
  <main class="public-shell">
    <section id="loadingCard" class="public-card state-card">
      <div class="spinner" aria-hidden="true"></div>
      <p>Cargando contacto…</p>
    </section>

    <section id="errorCard" class="public-card state-card hidden">
      <div class="public-avatar">!</div>
      <h1>Contacto no disponible</h1>
      <p id="errorText" class="muted">El enlace no existe o fue desactivado.</p>
    </section>

    <article id="contactCard" class="public-card hidden">
      <div class="public-cover">
        <div id="cadayaBrandBanner" class="public-brand-banner hidden" aria-label="GRUPO CADAYA SAS">
          <span class="public-brand-logo-wrap">
            <img src="assets/logo-cadaya.png" alt="Logo de GRUPO CADAYA SAS" class="public-brand-logo">
          </span>
          <span class="public-brand-copy">
            <strong>SER CADAYA</strong>
            <span>ES SER RENTABLE</span>
          </span>
        </div>
      </div>
      <div class="public-content">
        <img id="publicPhoto" class="public-photo hidden" alt="Foto del contacto">
        <div id="publicInitials" class="public-avatar">QR</div>

        <p id="publicCompany" class="eyebrow">Empresa</p>
        <h1 id="publicName">Nombre del contacto</h1>
        <p id="publicJobTitle" class="public-role">Cargo</p>

        <div class="primary-actions">
          <a id="callButton" class="button button-primary" href="#">Llamar</a>
          <a id="whatsappButton" class="button button-secondary hidden" href="#" target="_blank" rel="noopener">WhatsApp</a>
        </div>

        <button id="saveContactButton" class="button button-save" type="button">Guardar contacto</button>
        <button id="shareButton" class="button button-ghost hidden" type="button">Compartir tarjeta</button>

        <dl class="contact-details">
          <div id="mobileRow">
            <dt>
              <span class="detail-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.89.33 1.76.63 2.6a2 2 0 0 1-.45 2.11L8 9.91a16 16 0 0 0 6.09 6.09l1.48-1.29a2 2 0 0 1 2.11-.45c.84.3 1.71.51 2.6.63A2 2 0 0 1 22 16.92z"/></svg>
              </span>
              <span>Celular</span>
            </dt>
            <dd><a id="mobileLink" href="#"></a></dd>
          </div>
          <div id="phoneRow" class="hidden">
            <dt>
              <span class="detail-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.89.33 1.76.63 2.6a2 2 0 0 1-.45 2.11L8 9.91a16 16 0 0 0 6.09 6.09l1.48-1.29a2 2 0 0 1 2.11-.45c.84.3 1.71.51 2.6.63A2 2 0 0 1 22 16.92z"/></svg>
              </span>
              <span>Teléfono</span>
            </dt>
            <dd><a id="phoneLink" href="#"></a></dd>
          </div>
          <div id="emailRow" class="hidden">
            <dt>
              <span class="detail-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m3 7 9 6 9-6"></path></svg>
              </span>
              <span>Correo</span>
            </dt>
            <dd><a id="emailLink" href="#"></a></dd>
          </div>
          <div id="websiteRow" class="hidden">
            <dt>
              <span class="detail-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18"></path><path d="M12 3a15.3 15.3 0 0 1 0 18"></path><path d="M12 3a15.3 15.3 0 0 0 0 18"></path></svg>
              </span>
              <span>Sitio web</span>
            </dt>
            <dd><a id="websiteLink" href="#" target="_blank" rel="noopener"></a></dd>
          </div>
          <div id="addressRow" class="hidden">
            <dt>
              <span class="detail-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 12-9 12S3 17 3 10a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
              </span>
              <span>Dirección</span>
            </dt>
            <dd><a id="addressLink" class="maps-link" href="#" target="_blank" rel="noopener"></a></dd>
          </div>
          <div id="instagramRow" class="hidden">
            <dt>
              <span class="detail-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect><path d="M16.5 7.5h.01"></path><circle cx="12" cy="12" r="4"></circle></svg>
              </span>
              <span>Instagram</span>
            </dt>
            <dd><a id="instagramLink" class="instagram-link" href="https://www.instagram.com/grupo_cadaya_s.a.s/" target="_blank" rel="noopener">@grupo_cadaya_s.a.s</a></dd>
          </div>
          <div id="notesRow" class="hidden">
            <dt>
              <span class="detail-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M12 11v5"></path><path d="M12 8h.01"></path></svg>
              </span>
              <span>Información</span>
            </dt>
            <dd id="notesText"></dd>
          </div>
        </dl>
      </div>
    </article>

    <footer class="public-footer">Tarjeta digital de contacto</footer>
  </main>

  <script type="module" src="js/contact.js"></script>
</body>
</html>
